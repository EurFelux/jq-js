[[repos]]
repo = "builtin"
hooks = [
  { id = "trailing-whitespace" },
  { id = "end-of-file-fixer" },
  { id = "check-json" },
  { id = "check-toml" },
]

[[repos]]
repo = "local"
hooks = [
  {
    id = "oxlint",
    name = "oxlint",
    language = "system",
    entry = "pnpm run lint",
    pass_filenames = false,
    files = { glob = "src/**/*.ts" },
  },
  {
    id = "oxfmt",
    name = "oxfmt",
    language = "system",
    entry = "pnpm run fmt:check",
    pass_filenames = false,
    files = { glob = "{src,tests}/**/*.ts" },
  },
]
